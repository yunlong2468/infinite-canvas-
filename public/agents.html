<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能体管理</title>
<style>
:root { --bg:#0D0D0D; --panel:#171717; --text:#fff; --text2:#A1A1AA; --accent:#05A3C5; --danger:#F53F3F; --border:rgba(255,255,255,0.08); --radius:12px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; min-height:100vh; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:var(--panel); border-bottom:0.5px solid var(--border); }
.topbar h1 { font-size:18px; }
.topbar .nav { display:flex; gap:8px; }
.topbar a { color:var(--text2); text-decoration:none; font-size:13px; padding:6px 12px; border-radius:6px; transition:all 0.15s; }
.topbar a:hover { background:var(--border); color:var(--text); }
.topbar a.active { color:var(--accent); background:rgba(5,163,197,0.1); }
.container { max-width:800px; margin:0 auto; padding:24px; }
.toolbar { display:flex; gap:10px; margin-bottom:20px; }
.btn { padding:9px 18px; border-radius:8px; border:none; cursor:pointer; font-size:13px; font-family:inherit; font-weight:600; transition:opacity 0.2s; }
.btn:hover { opacity:0.85; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-danger { background:rgba(245,63,63,0.15); color:var(--danger); border:0.5px solid rgba(245,63,63,0.3); }
.agent-card { background:var(--panel); border:0.5px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:10px; }
.agent-card .a-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.agent-card .a-name { font-size:16px; font-weight:700; }
.agent-card .a-model { font-size:11px; color:var(--accent); background:rgba(5,163,197,0.1); padding:2px 8px; border-radius:4px; }
.agent-card .a-detail { font-size:12px; color:var(--text2); margin-top:4px; }
.agent-card .a-prompt { font-size:12px; color:var(--text2); margin-top:8px; padding:8px 12px; background:rgba(255,255,255,0.03); border-radius:6px; max-height:60px; overflow:hidden; text-overflow:ellipsis; white-space:pre-wrap; }
.agent-card .a-actions { display:flex; gap:6px; margin-top:10px; }
.agent-card .a-actions button { padding:4px 12px; border-radius:6px; border:0.5px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-size:11px; font-family:inherit; }
.agent-card .a-actions button:hover { background:var(--border); color:var(--text); }
.agent-card .a-actions .del:hover { background:rgba(245,63,63,0.1); color:var(--danger); }
/* 编辑弹窗 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:500; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.modal-overlay.show { opacity:1; pointer-events:auto; }
.modal-box { background:var(--panel); border:0.5px solid var(--border); border-radius:var(--radius); padding:24px; width:90%; max-width:500px; max-height:85vh; overflow-y:auto; }
.modal-box h3 { margin-bottom:16px; font-size:16px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:5px; }
.form-group input, .form-group textarea, .form-group select { width:100%; padding:9px 12px; background:#0a0a0a; border:0.5px solid var(--border); border-radius:7px; color:var(--text); font-size:13px; font-family:inherit; outline:none; resize:vertical; }
.form-group textarea { min-height:80px; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--accent); }
.form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
.empty { text-align:center; padding:60px 20px; color:var(--text2); }
</style>
</head>
<body>
<div class="topbar">
    <h1>🤖 智能体管理</h1>
    <div class="nav">
        <a id="linkBack" href="/canvas.html">← 返回画布</a>
        <a href="/projects.html">📁 项目列表</a>
        <a href="/agents.html" class="active">🤖 智能体</a>
        <button class="btn btn-danger" onclick="logout()" style="font-size:12px;padding:5px 14px;">退出</button>
    </div>
</div>
<div class="container">
    <div class="toolbar" style="flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="openEditor()">+ 新建智能体</button>
        <input type="text" id="importCode" placeholder="输入分享码导入智能体..." style="flex:1;min-width:200px;padding:9px 12px;background:#0a0a0a;border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;" maxlength="30">
        <button class="btn" style="background:rgba(5,163,197,0.15);color:var(--accent);border:0.5px solid rgba(5,163,197,0.3);" onclick="importAgent()">📥 导入</button>
    </div>
    <div id="agentList"><div class="empty">加载中...</div></div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeEditor()">
    <div class="modal-box">
        <h3 id="modalTitle">新建智能体</h3>
        <div class="form-group"><label>名称 *</label><input type="text" id="edName" placeholder="例如：剧本拆分助手"></div>
        <div class="form-group"><label>模型</label><select id="edModel">
            <option value="gpt-4o">GPT-4o</option><option value="gpt-4o-mini">GPT-4o Mini</option>
            <option value="gpt-4-turbo">GPT-4 Turbo</option><option value="claude-3-opus">Claude 3 Opus</option>
            <option value="claude-3.5-sonnet">Claude 3.5 Sonnet</option>
            <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
            <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
            <option value="qwen-plus">Qwen Plus</option><option value="custom">自定义...</option>
        </select></div>
        <div class="form-group"><label>API 端点 URL</label><input type="text" id="edEndpoint" placeholder="https://api.openai.com/v1/chat/completions"></div>
        <div class="form-group"><label>API 密钥</label><input type="password" id="edKey" placeholder="sk-...（密钥加密存储在服务器）"></div>
        <div class="form-group"><label>系统提示词</label><textarea id="edPrompt" placeholder="你是一个专业的剧本拆分助手..."></textarea></div>
        <div class="form-group" style="display:flex;gap:12px;">
            <div style="flex:1"><label>温度 (0-2)</label><input type="number" id="edTemp" value="0" min="0" max="2" step="0.1"></div>
            <div style="flex:1"><label>最大 Token <input type="checkbox" id="edMaxTokOn" style="width:auto;margin-left:4px;vertical-align:middle;" onchange="document.getElementById('edMaxTokens').style.display=this.checked?'':'none'"> 启用</label><input type="number" id="edMaxTokens" value="16384" min="256" max="131072" style="display:none"></div>
        </div>
        <div class="form-actions">
            <button class="btn" style="background:var(--border);color:var(--text);" onclick="closeEditor()">取消</button>
            <button class="btn btn-primary" id="btnSave">保存</button>
        </div>
    </div>
</div>

<script>
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, type) {
  var t = document.getElementById('_toast');
  if (!t) { t = document.createElement('div'); t.id = '_toast'; t.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:999;padding:8px 20px;border-radius:8px;font-size:13px;font-family:inherit;pointer-events:none;opacity:0;transition:opacity 0.3s;max-width:500px;text-align:center;'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.background = type==='error'?'rgba(245,63,63,0.9)':type==='warn'?'rgba(245,166,35,0.9)':'rgba(0,180,100,0.9)';
  t.style.color = '#fff'; t.style.opacity = '1';
  if (t._timer) clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.style.opacity = '0'; }, 2500);
}
function showConfirm(msg, cb) {
  var ov = document.createElement('div');
  ov.className = 'modal-overlay'; ov.style.cssText = 'z-index:800;opacity:1;pointer-events:auto;';
  ov.innerHTML = '<div class="modal-box" style="width:380px;height:auto;padding:24px;">'+
    '<div style="font-size:14px;margin-bottom:16px;line-height:1.5;">'+escHtml(msg)+'</div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;">'+
      '<button style="padding:8px 18px;border-radius:6px;border:0.5px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text2);cursor:pointer;font-family:inherit;" onclick="this.closest(\'.modal-overlay\').remove();window._acb(false)">取消</button>'+
      '<button style="padding:8px 18px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;" onclick="this.closest(\'.modal-overlay\').remove();window._acb(true)">确定</button>'+
    '</div></div>';
  document.body.appendChild(ov);
  window._acb = cb;
  ov.addEventListener('click', function(e) { if (e.target===ov) { ov.remove(); cb(false); } });
}
function encodeId(id) { return parseInt(id) * 1114514; }
function decodeId(enc) { var n = parseInt(enc); return isNaN(n) ? 1 : Math.round(n / 1114514); }
var projectId = decodeId(new URLSearchParams(location.search).get('pid'));
document.getElementById('linkBack').href = '/canvas.html?pid=' + encodeId(projectId);
var token = localStorage.getItem('canvas_token');
if (!token) { window.location.replace('/login.html'); }
var API = '/api';
function api(method, path, body) {
    var opts = { method:method, headers:{'Content-Type':'application/json','Authorization':'Bearer '+token} };
    if (body) opts.body = JSON.stringify(body);
    return fetch(API+path, opts).then(function(r) {
        if (r.status===401) { localStorage.removeItem('canvas_token'); localStorage.removeItem('canvas_username'); window.location.replace('/login.html'); return Promise.reject(); }
        return r.json().catch(function(){ return null; });
    });
}

var editingId = null;

// 模型切换时自动调整参数
document.getElementById('edModel').addEventListener('change', function() {
    var m = this.value.toLowerCase();
    if (m.indexOf('deepseek') >= 0) {
        document.getElementById('edTemp').value = '0';
        document.getElementById('edEndpoint').value = 'https://api.deepseek.com/v1/chat/completions';
    }
});

function loadAgents() {
    api('GET','/agents').then(function(agents) {
        var list = document.getElementById('agentList');
        if (!agents || !agents.length) {
            list.innerHTML = '<div class="empty"><p style="font-size:16px;">还没有智能体</p><p>点击上方按钮创建第一个</p></div>';
            return;
        }
        list.innerHTML = agents.map(function(a) {
            var promptPreview = (a.system_prompt || '无系统提示词').substring(0, 120);
            return '<div class="agent-card">'+
                '<div class="a-header"><span class="a-name">'+esc(a.name)+'</span><span class="a-model">'+esc(a.model)+'</span></div>'+
                '<div class="a-detail">端点: '+esc(a.api_endpoint)+' · 温度: '+a.temperature+' · MaxToken: '+(a.max_tokens_enabled ? a.max_tokens : '不限制')+'</div>'+
                '<div class="a-prompt">'+esc(promptPreview)+(a.system_prompt&&a.system_prompt.length>120?'…':'')+'</div>'+
                '<div class="a-actions">'+
                '<button onclick="openEditor('+a.id+')">✏️ 编辑</button>'+
                '<button onclick="shareAgent('+a.id+')">📤 分享</button>'+
                '<button class="del" onclick="deleteAgent('+a.id+')">🗑️ 删除</button>'+
                '</div></div>';
        }).join('');
    });
}

function openEditor(id) {
    editingId = id || null;
    document.getElementById('modalTitle').textContent = id ? '编辑智能体' : '新建智能体';
    document.getElementById('btnSave').textContent = id ? '更新' : '创建';
    if (id) {
        api('GET','/agents').then(function(agents) {
            var a = agents.find(function(x) { return x.id === id; });
            if (!a) return;
            document.getElementById('edName').value = a.name;
            document.getElementById('edModel').value = a.model;
            document.getElementById('edEndpoint').value = a.api_endpoint;
            document.getElementById('edKey').value = a.api_key || '';
            document.getElementById('edPrompt').value = a.system_prompt || '';
            document.getElementById('edTemp').value = a.temperature;
            document.getElementById('edMaxTokens').value = a.max_tokens || 16384;
            var mtOn = a.max_tokens_enabled === 1;
            document.getElementById('edMaxTokOn').checked = mtOn;
            document.getElementById('edMaxTokens').style.display = mtOn ? '' : 'none';
        });
    } else {
        document.getElementById('edMaxTokOn').checked = false;
        document.getElementById('edMaxTokens').style.display = 'none';
        document.getElementById('edName').value = '';
        document.getElementById('edModel').value = 'gpt-4o';
        document.getElementById('edEndpoint').value = 'https://api.openai.com/v1/chat/completions';
        document.getElementById('edKey').value = '';
        document.getElementById('edPrompt').value = '';
        document.getElementById('edTemp').value = '0';
        document.getElementById('edMaxTokens').value = '16384';
    }
    document.getElementById('modalOverlay').classList.add('show');
}

function closeEditor() { editingId = null; document.getElementById('modalOverlay').classList.remove('show'); }

document.getElementById('btnSave').addEventListener('click', function() {
    var data = {
        name: document.getElementById('edName').value.trim(),
        model: document.getElementById('edModel').value,
        api_endpoint: document.getElementById('edEndpoint').value.trim(),
        api_key: document.getElementById('edKey').value.trim(),
        system_prompt: document.getElementById('edPrompt').value.trim(),
        temperature: parseFloat(document.getElementById('edTemp').value)||0.7,
        max_tokens: parseInt(document.getElementById('edMaxTokens').value)||16384,
        max_tokens_enabled: document.getElementById('edMaxTokOn').checked ? 1 : 0
    };
    if (!data.name) { toast('请输入名称','error'); return; }
    var method = editingId ? 'PUT' : 'POST';
    var path = editingId ? '/agents/'+editingId : '/agents';
    api(method, path, data).then(function() { closeEditor(); loadAgents(); });
});

function shareAgent(id) {
    api('POST','/agents/'+id+'/share').then(function(r) {
        if (r && r.shareCode) {
            var code = r.shareCode;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(code).then(function() {
                    toast('分享码已复制到剪贴板:\n' + code, '');
                });
            } else {
                toast('分享码: ' + code, '')
            }
        }
    });
}

function importAgent() {
    var code = document.getElementById('importCode').value.trim();
    if (!code) { toast('请输入分享码','error'); return; }
    api('POST','/agents/import', { shareCode: code }).then(function(r) {
        if (r && r.id) {
            toast('智能体已导入：「' + r.name + '」\n模型: ' + r.model, '');
            document.getElementById('importCode').value = '';
            loadAgents();
        }
    });
}

function deleteAgent(id) {
    showConfirm('确定删除此智能体吗？', function(ok) {
      if (ok) {
        api('DELETE','/agents/'+id).then(function() { loadAgents(); });
      }
    });
}

function showConfirm(msg, cb) {
  var ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:800;display:flex;align-items:center;justify-content:center;';
  ov.innerHTML = '<div style="background:#171717;border:0.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:24px;width:380px;">'+
    '<div style="font-size:14px;margin-bottom:16px;line-height:1.5;color:#fff;">'+msg+'</div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;">'+
      '<button style="padding:8px 18px;border-radius:6px;border:0.5px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.06);color:#A1A1AA;cursor:pointer;font-family:inherit;" onclick="this.closest(\'div > div\').parentElement.remove();window._acfm(false)">取消</button>'+
      '<button style="padding:8px 18px;border-radius:6px;border:none;background:#05A3C5;color:#fff;cursor:pointer;font-family:inherit;" onclick="this.closest(\'div > div\').parentElement.remove();window._acfm(true)">确定</button>'+
    '</div></div>';
  document.body.appendChild(ov);
  window._acfm = cb;
  ov.addEventListener('click', function(e) { if (e.target===ov) { ov.remove(); cb(false); } });
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function logout() {
  showConfirm('确定要退出登录吗？', function(ok) {
    if (ok) { localStorage.removeItem('canvas_token'); localStorage.removeItem('canvas_username'); window.location.replace('/login.html'); }
  });
}

loadAgents();

// SSE 实时通知（互踢检测）
(function() {
  var sse = new EventSource('/api/sse?token=' + encodeURIComponent(token));
  sse.addEventListener('message', function(e) {
    try {
      var d = JSON.parse(e.data);
      if (d.type === 'kicked') {
        localStorage.removeItem('canvas_token');
        localStorage.removeItem('canvas_username');
        window.location.replace('/login.html?reason=kicked');
      }
    } catch(ex) {}
  });
})();
</script>
</body>
</html>
